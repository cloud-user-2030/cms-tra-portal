<!DOCTYPE html>
<html>
<head>
  <title>CMS TRA Portal</title>
  <style>
    body { font-family: Arial; margin:0; background:#0f172a; color:white; }
    .nav { display:flex; gap:10px; padding:15px; overflow:auto; }
    .tab { padding:10px 15px; background:#1e293b; border-radius:10px; cursor:pointer; }
    .tab:hover { background:#334155; }
    .active { background:white; color:#1e3a8a; font-weight:bold; }
    .content { padding:40px; }
    .card { background:#1e293b; padding:20px; border-radius:12px; margin-top:20px; }
  </style>
</head>

<body>

<h2 style="padding:20px;">CMS TRA Interactive Portal</h2>

<div class="nav" id="tabs"></div>

<div class="content">
  <h1 id="title">AI Insights</h1>
  <p id="desc">Smarter TRA decisions</p>

  <div class="card" id="output">
    Click a tab to explore.
  </div>
</div>

<script>
const tabs = [
  "Business Rules","Recommended Practices","AI Insights",
  "Heat Map","Analytics","Traceability"
];

const content = {
  "Business Rules":"Explore enforceable TRA rules.",
  "Recommended Practices":"Implementation guidance.",
  "AI Insights":"AI-powered summaries and insights.",
  "Heat Map":"Visual maturity and risk.",
  "Analytics":"Executive metrics dashboard.",
  "Traceability":"Rule → Requirement → Evidence."
};

const tabContainer = document.getElementById("tabs");

tabs.forEach(tab=>{
  const el = document.createElement("div");
  el.innerText = tab;
  el.className = "tab";

  el.onclick = ()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    el.classList.add("active");

    document.getElementById("title").innerText = tab;
    document.getElementById("desc").innerText = content[tab];
    document.getElementById("output").innerText = "Viewing: " + tab;
  };

  tabContainer.appendChild(el);
});
</script>

</body>
</html>
